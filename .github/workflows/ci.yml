name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: opportunity
          POSTGRES_PASSWORD: opportunity
          POSTGRES_DB: opportunity
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opportunity -d opportunity"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://opportunity:opportunity@localhost:5432/opportunity?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: services/core-api/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: go run ./cmd/migrate up
        working-directory: services/core-api
      - run: go test ./...
        working-directory: services/core-api
      - run: go vet ./...
        working-directory: services/core-api
      - run: corepack pnpm -r --if-present typecheck
      - run: corepack pnpm -r --if-present build
      - run: go test ./internal/postgres -run TestPhaseHNeutralPostgresEndToEnd -v
        working-directory: services/core-api
