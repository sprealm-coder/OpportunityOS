openapi: 3.1.0
info:
  title: OpportunityOS Core API
  version: 0.1.0
paths:
  /healthz:
    get:
      operationId: health
      responses:
        "200": { description: Healthy }
  /v1/opportunities:
    get:
      operationId: listOpportunities
      security: [{ tenant: [] }]
      responses:
        "200": { description: Opportunity collection }
    post:
      operationId: createOpportunity
      security: [{ tenant: [] }]
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string }
      responses:
        "201": { description: Created }
components:
  securitySchemes:
    tenant:
      type: apiKey
      in: header
      name: X-Tenant-ID

