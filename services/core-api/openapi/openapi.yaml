openapi: 3.1.0
info:
  title: OpportunityOS Core API
  version: 0.7.0
servers:
  - url: http://127.0.0.1:8080
paths:
  /healthz:
    get:
      operationId: health
      security: []
      responses:
        "200": { description: Healthy }
  /v1/auth/sessions:
    post:
      operationId: createSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        "201":
          description: Authenticated session; sets an HttpOnly SameSite cookie
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "401": { description: Invalid credentials }
  /v1/auth/session:
    get:
      operationId: getSession
      responses:
        "200":
          description: Current authenticated session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "401": { description: Missing or expired session }
    delete:
      operationId: deleteSession
      responses:
        "204": { description: Session revoked }
  /v1/opportunities:
    get:
      operationId: listOpportunities
      responses:
        "200": { description: Opportunity collection }
    post:
      operationId: createOpportunity
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1 }
                description: { type: string }
      responses:
        "201": { description: Created }
  /v1/opportunities/{id}:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }]
    get:
      operationId: getOpportunity
      responses:
        "200": { description: Opportunity with evidence }
  /v1/opportunities/{id}/evidence:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: addOpportunityEvidence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, summary, confidence]
              properties:
                kind: { type: string }
                summary: { type: string }
                confidence: { type: integer, minimum: 0, maximum: 100 }
      responses:
        "200": { description: Evidence added }
  /v1/opportunities/{id}/score:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: scoreOpportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [score]
              properties:
                score: { type: integer, minimum: 0, maximum: 100 }
      responses:
        "200": { description: Opportunity scored }
  /v1/opportunities/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: transitionOpportunity
      responses:
        "200": { description: Opportunity transitioned }
  /v1/opportunities/{id}/reviews:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: reviewOpportunity
      responses:
        "200": { description: Review recorded and opportunity transitioned }
  /v1/opportunities/{id}/incubations:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createIncubation
      responses:
        "201": { description: Incubation created }
  /v1/opportunities/{id}/blueprints:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createBlueprint
      responses:
        "201": { description: Blueprint created }
  /v1/incubations:
    get:
      operationId: listIncubations
      responses:
        "200": { description: Incubation collection }
  /v1/incubations/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: transitionIncubation
      responses:
        "200": { description: Incubation transitioned }
  /v1/blueprints:
    get:
      operationId: listBlueprints
      responses:
        "200": { description: Blueprint collection }
  /v1/blueprints/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: transitionBlueprint
      responses:
        "200": { description: Blueprint transitioned }
  /v1/capabilities:
    get:
      operationId: listCapabilities
      responses:
        "200": { description: Tenant capability collection }
    post:
      operationId: createCapability
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                definition: { type: object, additionalProperties: true }
      responses:
        "201": { description: Capability created }
  /v1/providers:
    get:
      operationId: listProviders
      responses:
        "200": { description: Provider collection with endpoints }
    post:
      operationId: createProvider
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "201": { description: Provider created }
  /v1/providers/{id}/endpoints:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createProviderEndpoint
      responses:
        "201": { description: Provider endpoint created }
  /v1/blueprints/{id}/products:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createProductFromBlueprint
      responses:
        "201": { description: Product draft created }
        "409": { description: Blueprint has not passed approval }
  /v1/products:
    get:
      operationId: listProducts
      responses:
        "200": { description: Product collection }
  /v1/products/{id}:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }]
    get:
      operationId: getProduct
      responses:
        "200":
          description: Product with immutable versions, SKUs, and publications
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductDetail" }
  /v1/products/{id}/versions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createProductVersion
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductVersionInput" }
      responses:
        "201": { description: Immutable product version and versioned bindings created }
        "422": { description: Schema, workflow, metering, pricing, routing, delivery, or compliance validation failed }
  /v1/products/{id}/skus:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createSKU
      responses:
        "201": { description: SKU draft created }
  /v1/skus/{id}/versions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createSKUVersion
      responses:
        "201": { description: Immutable SKU version created with product bindings }
  /v1/products/{id}/publications:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: publishProduct
      responses:
        "201": { description: Product version published }
        "409": { description: Publication readiness check failed }
  /v1/quotes:
    get:
      operationId: listQuotes
      responses:
        "200": { description: Tenant quote collection with immutable versions }
    post:
      operationId: createQuote
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuoteInput" }
      responses:
        "201":
          description: Draft quote with server-calculated immutable version
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quote" }
        "422": { description: SKU is unpublished, version bindings mismatch, or pricing failed }
  /v1/quotes/{id}:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }]
    get:
      operationId: getQuote
      responses:
        "200":
          description: Quote with immutable versions and line bindings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quote" }
        "404": { description: Quote not found in tenant }
  /v1/quotes/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: transitionQuote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to]
              properties:
                to: { type: string, enum: [sent, accepted, rejected, expired, cancelled] }
      responses:
        "200": { description: Quote transitioned by domain command }
        "409": { description: Invalid transition or expired quote }
  /v1/orders:
    get:
      operationId: listOrders
      responses:
        "200": { description: Tenant orders with fulfillment and operational facts }
    post:
      operationId: createOrder
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quote_version_id]
              properties:
                quote_version_id: { type: string, format: uuid }
      responses:
        "201":
          description: Order created from latest accepted quote version
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
        "409": { description: Quote is unaccepted, expired, or stale }
  /v1/orders/{id}:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }]
    get:
      operationId: getOrder
      responses:
        "200":
          description: Order aggregate with items, subscriptions, entitlements, executions, deliveries, usage, costs, and charges
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
        "404": { description: Order not found in tenant }
  /v1/orders/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: transitionOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to]
              properties:
                to: { type: string, enum: [awaiting_payment, paid, provisioning, active, completed, cancelled, refund_pending, refunded, disputed] }
      responses:
        "200": { description: Order transitioned; provisioning atomically creates fulfillment records }
        "409": { description: Invalid transition or fulfillment prerequisite failed }
  /v1/executions/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: transitionExecution
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExecutionTransitionInput" }
      responses:
        "200": { description: Execution transitioned by the controlled state machine }
        "409": { description: Invalid transition or provider readiness failed }
  /v1/deliveries/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: transitionDelivery
      responses:
        "200": { description: Delivery project transitioned }
        "409": { description: Execution has not succeeded or transition is invalid }
  /v1/executions/{id}/usage:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: recordUsage
      responses:
        "201": { description: Usage fact recorded independently from cost and charge }
  /v1/executions/{id}/provider-costs:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: recordProviderCost
      responses:
        "201": { description: Provider cost fact recorded }
  /v1/executions/{id}/customer-charges:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: calculateCustomerCharge
      responses:
        "201": { description: Customer charge calculated from immutable pricing and recorded usage }
  /v1/finance:
    get:
      operationId: listFinance
      responses:
        "200":
          description: Tenant wallet, ledger, payable, settlement, and reconciliation view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FinanceOverview" }
  /v1/wallets:
    post:
      operationId: createWallet
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner_type, owner_id, currency]
              properties:
                owner_type: { type: string, enum: [customer, provider, reseller, platform] }
                owner_id: { type: string, minLength: 1 }
                currency: { type: string, minLength: 3, maxLength: 3 }
      responses:
        "201": { description: Wallet and available/held liability accounts created }
  /v1/wallets/{id}/adjustments:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: postWalletAdjustment
      responses:
        "201": { description: Administrative balanced wallet adjustment posted }
        "403": { description: Administrative finance permission required }
  /v1/orders/{id}/holds:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: placeOrderHold
      responses:
        "201": { description: Available wallet funds moved to held funds without revenue recognition }
        "422": { description: Wallet mismatch or insufficient available balance }
  /v1/holds/{id}/releases:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: releaseHold
      responses:
        "200": { description: Remaining held funds returned to available balance }
  /v1/customer-charges/{id}/postings:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: postCustomerCharge
      responses:
        "201": { description: Calculated CustomerCharge converted to a balanced ledger transaction }
        "409": { description: Charge is already posted or held funds do not cover it }
  /v1/customer-charges/{id}/refunds:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: refundCustomerCharge
      responses:
        "201": { description: Refund posted as a new balanced transaction without editing history }
  /v1/customer-charges/{id}/commissions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createCommission
      responses:
        "201": { description: Commission expense and beneficiary payable posted }
  /v1/provider-costs/{id}/payables:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createProviderPayable
      responses:
        "201": { description: ProviderCost converted to provider expense and payable entries }
  /v1/settlements:
    post:
      operationId: createSettlement
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "201": { description: Provider payable or commission settled against platform cash }
  /v1/reconciliation-runs:
    post:
      operationId: runReconciliation
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "201": { description: Operational charges, costs, and commissions compared with accounting facts }
  /v1/growth:
    get:
      operationId: listGrowth
      responses:
        "200":
          description: Tenant growth control-plane overview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GrowthOverview" }
  /v1/market-segments:
    post:
      operationId: createMarketSegment
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "201": { description: Product-agnostic market segment created }
  /v1/market-segments/{id}/icps:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createICPDefinition
      responses:
        "201": { description: Schema-driven ICP definition created }
  /v1/leads:
    post:
      operationId: createLead
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "201": { description: Lead created independently from Customer }
  /v1/leads/{id}/evidence:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: addLeadEvidence
      responses:
        "201": { description: Tenant-scoped lead evidence added }
  /v1/leads/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: transitionLead
      responses:
        "200": { description: Lead transitioned by domain command }
  /v1/leads/{id}/contacts:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createContact
      responses:
        "201": { description: Consent-aware contact and provenance created }
  /v1/proof-templates:
    post:
      operationId: createProofTemplate
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "201": { description: Schema and workflow driven Proof template created }
  /v1/leads/{id}/proof-requests:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createProofRequest
      responses:
        "201": { description: Expiring and access-controlled Proof request created }
  /v1/proof-requests/{id}/generate:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: recordGeneratedProof
      responses:
        "201": { description: Trusted workflow result stored for review }
  /v1/proof-requests/{id}/reviews:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: reviewProof
      responses:
        "200": { description: Proof reviewed by a separately authorized actor }
  /v1/campaigns:
    post:
      operationId: createCampaign
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "201": { description: Campaign draft created }
  /v1/campaigns/{id}/steps:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: addCampaignStep
      responses:
        "201": { description: Controlled campaign step added }
  /v1/campaigns/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: transitionCampaign
      responses:
        "200": { description: Campaign transitioned with approval gate }
  /v1/campaigns/{id}/reviews:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: reviewCampaign
      responses:
        "200": { description: Campaign version reviewed by an approver }
  /v1/suppressions:
    post:
      operationId: createSuppression
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "201": { description: Do-not-contact, opt-out, bounce, or complaint suppression created }
  /v1/campaigns/{id}/outreach:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: planOutreach
      responses:
        "201": { description: Outreach planned or blocked after suppression and quota checks; no delivery occurs }
  /v1/outreach/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: cancelPlannedOutreach
      responses:
        "200": { description: Planned outreach cancelled and reserved quota released }
        "423": { description: External delivery transitions are feature-gated }
  /v1/conversations:
    post:
      operationId: createConversation
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "201": { description: Lead or Deal conversation created }
  /v1/conversations/{id}/messages:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: addConversationMessage
      responses:
        "201": { description: Inbound or unsent outbound conversation record created }
  /v1/deals:
    post:
      operationId: createDeal
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "201": { description: Deal created independently from Order }
  /v1/deals/{id}:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }]
    get:
      operationId: getDeal
      responses:
        "200": { description: Tenant-scoped canonical Deal }
  /v1/deals/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: transitionDeal
      responses:
        "200": { description: Deal transitioned with canonical Quote gate }
  /v1/deals/{id}/quotes:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createDealQuote
      responses:
        "201": { description: Existing transaction Quote created and bound to canonical Deal }
  /v1/experiments:
    post:
      operationId: createGrowthExperiment
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "201": { description: Growth experiment draft created }
  /v1/experiments/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: transitionGrowthExperiment
      responses:
        "200": { description: Experiment started, completed with results, or cancelled }
  /v1/channels:
    get:
      operationId: listChannels
      responses:
        "200":
          description: Tenant reseller, supplier, and internal marketplace overview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChannelOverview" }
  /v1/reseller-levels:
    post:
      operationId: createResellerLevel
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Reseller level created } }
  /v1/resellers:
    post:
      operationId: createReseller
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Reseller created } }
  /v1/attribution-rules:
    post:
      operationId: createAttributionRule
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Versioned attribution rule created } }
  /v1/lead-ownerships:
    post:
      operationId: assignLeadOwnership
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Protected lead ownership assigned } }
  /v1/customer-ownerships:
    post:
      operationId: createCustomerOwnership
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Customer ownership linked to canonical customer identifier } }
  /v1/ownership-transfers:
    post:
      operationId: requestOwnershipTransfer
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Ownership transfer requested } }
  /v1/ownership-transfers/{id}/reviews:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: reviewOwnershipTransfer
      responses: { "200": { description: Transfer independently approved or rejected } }
  /v1/commission-rules:
    post:
      operationId: createCommissionRule
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Reseller commission rule created } }
  /v1/commission-locks:
    post:
      operationId: lockCanonicalCommission
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Existing canonical Commission locked to reseller attribution } }
  /v1/settlement-cycles:
    post:
      operationId: createResellerSettlementCycle
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Reseller settlement cycle created without duplicating Settlement } }
  /v1/suppliers:
    post:
      operationId: createSupplier
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Supplier created } }
  /v1/suppliers/{id}/capabilities:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: bindSupplierCapability
      responses: { "201": { description: Existing Capability bound to Supplier } }
  /v1/providers/{id}/supplier-binding:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: bindProviderSupplier
      responses: { "200": { description: Existing Provider assigned to canonical Supplier } }
  /v1/supplier-contracts:
    post:
      operationId: createSupplierContract
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Supplier contract draft created } }
  /v1/supplier-contracts/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: transitionSupplierContract
      responses: { "200": { description: Supplier contract transitioned; activation requires an active rate } }
  /v1/supplier-contracts/{id}/reviews:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: reviewSupplierContract
      responses: { "200": { description: Supplier contract independently approved or rejected } }
  /v1/supplier-rates:
    post:
      operationId: createSupplierRate
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Integer supplier capability rate created } }
  /v1/supplier-quality-records:
    post:
      operationId: recordSupplierQuality
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Supplier quality evidence recorded } }
  /v1/developers:
    post:
      operationId: createDeveloper
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Internal marketplace developer created } }
  /v1/publishers:
    post:
      operationId: createPublisher
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Developer publisher identity created } }
  /v1/listings:
    post:
      operationId: createListing
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Internal marketplace Listing draft created } }
  /v1/listings/{id}/versions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: createListingVersion
      responses: { "201": { description: Immutable ListingVersion created } }
  /v1/listings/{id}/transitions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: transitionListing
      responses: { "200": { description: Listing transitioned through review, sandbox, quality, and release gates } }
  /v1/listings/{id}/reviews:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: reviewListing
      responses: { "201": { description: Latest ListingVersion independently reviewed } }
  /v1/sandbox-runs:
    post:
      operationId: recordSandboxRun
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Controlled sandbox result recorded; arbitrary uploaded code is not executed } }
  /v1/quality-scores:
    post:
      operationId: recordListingQuality
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Listing quality score recorded } }
  /v1/marketplace-disputes:
    post:
      operationId: createMarketplaceDispute
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Marketplace dispute created } }
  /v1/marketplace-disputes/{id}/resolutions:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: resolveMarketplaceDispute
      responses: { "200": { description: Marketplace dispute independently resolved } }
  /v1/takedowns:
    post:
      operationId: requestTakedown
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "201": { description: Auditable Listing takedown requested } }
  /v1/takedowns/{id}/reviews:
    parameters: [{ $ref: "#/components/parameters/ObjectID" }, { $ref: "#/components/parameters/IdempotencyKey" }]
    post:
      operationId: reviewTakedown
      responses: { "200": { description: Takedown independently reviewed and approved removal executed } }
  /v1/audit:
    get:
      operationId: listAudit
      responses:
        "200": { description: Tenant audit records }
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: opportunity_session
  schemas:
    ChannelOverview:
      type: object
      required: [reseller_levels, resellers, attribution_rules, lead_ownerships, customer_ownerships, transfer_requests, conflicts, commission_rules, commission_locks, settlement_cycles, suppliers, supplier_capabilities, provider_bindings, supplier_contracts, supplier_rates, supplier_quality, provider_payables, reseller_settlements, supplier_settlements, marketplace]
      properties:
        reseller_levels: { type: array, items: { type: object, additionalProperties: true } }
        resellers: { type: array, items: { type: object, additionalProperties: true } }
        attribution_rules: { type: array, items: { type: object, additionalProperties: true } }
        lead_ownerships: { type: array, items: { type: object, additionalProperties: true } }
        customer_ownerships: { type: array, items: { type: object, additionalProperties: true } }
        transfer_requests: { type: array, items: { type: object, additionalProperties: true } }
        conflicts: { type: array, items: { type: object, additionalProperties: true } }
        commission_rules: { type: array, items: { type: object, additionalProperties: true } }
        commission_locks: { type: array, items: { type: object, additionalProperties: true } }
        settlement_cycles: { type: array, items: { type: object, additionalProperties: true } }
        suppliers: { type: array, items: { type: object, additionalProperties: true } }
        supplier_capabilities: { type: array, items: { type: object, additionalProperties: true } }
        provider_bindings: { type: array, items: { type: object, additionalProperties: true } }
        supplier_contracts: { type: array, items: { type: object, additionalProperties: true } }
        supplier_rates: { type: array, items: { type: object, additionalProperties: true } }
        supplier_quality: { type: array, items: { type: object, additionalProperties: true } }
        provider_payables: { type: array, items: { type: object, additionalProperties: true } }
        reseller_settlements: { type: array, items: { type: object, additionalProperties: true } }
        supplier_settlements: { type: array, items: { type: object, additionalProperties: true } }
        marketplace: { type: object, additionalProperties: true }
    FinanceOverview:
      type: object
      required: [wallets, accounts, transactions, holds, refunds, commissions, provider_payables, settlements, reconciliation_runs]
      properties:
        wallets: { type: array, items: { $ref: "#/components/schemas/Wallet" } }
        accounts: { type: array, items: { type: object, additionalProperties: true } }
        transactions: { type: array, items: { $ref: "#/components/schemas/LedgerTransaction" } }
        holds: { type: array, items: { type: object, additionalProperties: true } }
        refunds: { type: array, items: { type: object, additionalProperties: true } }
        commissions: { type: array, items: { type: object, additionalProperties: true } }
        provider_payables: { type: array, items: { type: object, additionalProperties: true } }
        settlements: { type: array, items: { type: object, additionalProperties: true } }
        reconciliation_runs: { type: array, items: { type: object, additionalProperties: true } }
    Wallet:
      type: object
      required: [id, tenant_id, owner_type, owner_id, currency, status, available_minor, held_minor]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        owner_type: { type: string }
        owner_id: { type: string }
        currency: { type: string, minLength: 3, maxLength: 3 }
        status: { type: string }
        available_minor: { type: integer }
        held_minor: { type: integer }
    LedgerTransaction:
      type: object
      required: [id, tenant_id, idempotency_key, transaction_type, reference_type, reference_id, entries, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        idempotency_key: { type: string }
        transaction_type: { type: string }
        reference_type: { type: string }
        reference_id: { type: string }
        entries:
          type: array
          minItems: 2
          items: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
    QuoteInput:
      type: object
      required: [deal_id, customer_id, currency, valid_until, items]
      properties:
        deal_id: { type: string, minLength: 1 }
        customer_id: { type: string, minLength: 1 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        valid_until: { type: string, format: date-time }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku_version_id, quantity, input]
            properties:
              sku_version_id: { type: string, format: uuid }
              quantity: { type: integer, minimum: 1 }
              input: { type: object, additionalProperties: true }
    VersionBindings:
      type: object
      required: [product_version_id, sku_version_id, workflow_version_id, pricing_version_id, routing_version_id]
      properties:
        product_version_id: { type: string, format: uuid }
        sku_version_id: { type: string, format: uuid }
        workflow_version_id: { type: string, format: uuid }
        pricing_version_id: { type: string, format: uuid }
        routing_version_id: { type: string, format: uuid }
        contract_version_id: { type: string }
    Quote:
      type: object
      required: [id, tenant_id, deal_id, customer_id, status, version, versions]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        deal_id: { type: string }
        growth_deal_id: { type: string, format: uuid }
        customer_id: { type: string }
        status: { type: string, enum: [draft, sent, accepted, rejected, expired, cancelled] }
        version: { type: integer, minimum: 1 }
        versions:
          type: array
          items:
            type: object
            additionalProperties: true
    GrowthOverview:
      type: object
      required: [segments, icps, leads, evidence, contacts, proof_templates, proof_requests, proof_instances, campaigns, suppressions, outreach, conversations, deals, experiments]
      properties:
        segments: { type: array, items: { type: object, additionalProperties: true } }
        icps: { type: array, items: { type: object, additionalProperties: true } }
        leads: { type: array, items: { $ref: "#/components/schemas/Lead" } }
        evidence: { type: array, items: { type: object, additionalProperties: true } }
        contacts: { type: array, items: { type: object, additionalProperties: true } }
        proof_templates: { type: array, items: { type: object, additionalProperties: true } }
        proof_requests: { type: array, items: { type: object, additionalProperties: true } }
        proof_instances: { type: array, items: { type: object, additionalProperties: true } }
        campaigns: { type: array, items: { type: object, additionalProperties: true } }
        suppressions: { type: array, items: { type: object, additionalProperties: true } }
        outreach: { type: array, items: { type: object, additionalProperties: true } }
        conversations: { type: array, items: { type: object, additionalProperties: true } }
        deals: { type: array, items: { $ref: "#/components/schemas/Deal" } }
        experiments: { type: array, items: { type: object, additionalProperties: true } }
    Lead:
      type: object
      required: [id, tenant_id, market_segment_id, name, status, score, version]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        market_segment_id: { type: string, format: uuid }
        icp_definition_id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string, enum: [discovered, enriched, qualified, proof_requested, proof_ready, approved_for_outreach, contacted, replied, meeting, proposal, won, lost, suppressed] }
        score: { type: integer, minimum: 0, maximum: 100 }
        version: { type: integer, minimum: 1 }
    Deal:
      type: object
      required: [id, tenant_id, lead_id, name, customer_id, status, value_minor, currency, version]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        lead_id: { type: string, format: uuid }
        name: { type: string }
        customer_id: { type: string }
        status: { type: string, enum: [open, proposal, won, lost, cancelled] }
        value_minor: { type: integer, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        version: { type: integer, minimum: 1 }
    ExecutionTransitionInput:
      type: object
      required: [to]
      properties:
        to: { type: string, enum: [validating, reserved, queued, submitted, processing, succeeded, failed, cancelled, reconciling, settled] }
        provider_endpoint_id: { type: string, format: uuid }
        external_id: { type: string }
        output: { type: object, additionalProperties: true }
        error: { type: object, additionalProperties: true }
    Order:
      type: object
      required: [id, tenant_id, customer_id, quote_version_id, status, currency, amount_minor, version, items, subscriptions, entitlements, executions, deliveries, usage, provider_costs, customer_charges]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        customer_id: { type: string }
        quote_version_id: { type: string, format: uuid }
        status: { type: string }
        currency: { type: string, minLength: 3, maxLength: 3 }
        amount_minor: { type: integer, minimum: 0 }
        version: { type: integer, minimum: 1 }
        bindings: { $ref: "#/components/schemas/VersionBindings" }
        items: { type: array, items: { type: object, additionalProperties: true } }
        subscriptions: { type: array, items: { type: object, additionalProperties: true } }
        entitlements: { type: array, items: { type: object, additionalProperties: true } }
        executions: { type: array, items: { type: object, additionalProperties: true } }
        deliveries: { type: array, items: { type: object, additionalProperties: true } }
        usage: { type: array, items: { type: object, additionalProperties: true } }
        provider_costs: { type: array, items: { type: object, additionalProperties: true } }
        customer_charges: { type: array, items: { type: object, additionalProperties: true } }
    ProductVersionInput:
      type: object
      required: [input_schema, output_schema, capability_ids, workflow, metering, price_book, route_policy, delivery_mode, compliance_profile]
      properties:
        input_schema: { type: object, additionalProperties: true }
        output_schema: { type: object, additionalProperties: true }
        form_schema: { type: object, additionalProperties: true }
        capability_ids: { type: array, minItems: 1, items: { type: string, format: uuid } }
        workflow: { type: object, additionalProperties: true }
        metering: { type: object, additionalProperties: true }
        price_book: { type: object, additionalProperties: true }
        route_policy: { type: object, additionalProperties: true }
        delivery_mode: { type: string, enum: [workflow, realtime, async, provisioning, manual] }
        compliance_profile: { type: object, additionalProperties: true }
        growth_playbook: { type: object, additionalProperties: true }
    ProductDetail:
      type: object
      required: [id, tenant_id, blueprint_id, name, status, version, versions, skus, publications]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        blueprint_id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string }
        version: { type: integer }
        versions: { type: array, items: { type: object, additionalProperties: true } }
        skus: { type: array, items: { type: object, additionalProperties: true } }
        publications: { type: array, items: { type: object, additionalProperties: true } }
    Session:
      type: object
      required: [id, user_id, email, display_name, tenant_id, tenant_name, role, expires_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string }
        tenant_id: { type: string, format: uuid }
        tenant_name: { type: string }
        role: { type: string, enum: [admin, operator, reviewer, auditor] }
        expires_at: { type: string, format: date-time }
  parameters:
    ObjectID:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema: { type: string, minLength: 1 }
security:
  - sessionCookie: []
