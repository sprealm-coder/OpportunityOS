name: opportunity-os
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: opportunity
      POSTGRES_PASSWORD: opportunity
      POSTGRES_DB: opportunity
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opportunity -d opportunity"]
      interval: 3s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: opportunity
      MINIO_ROOT_PASSWORD: change-me-in-production
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
  core-api:
    build:
      context: .
      dockerfile: deployments/core-api.Dockerfile
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://opportunity:opportunity@postgres:5432/opportunity?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  minio-data:
