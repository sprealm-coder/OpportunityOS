services:
  core-api:
    image: ${CORE_API_IMAGE:?CORE_API_IMAGE is required}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      OUTBOX_MAX_LAG_SECONDS: ${OUTBOX_MAX_LAG_SECONDS:-300}
      SESSION_COOKIE_SECURE: "true"
      OPPORTUNITY_ADAPTER_SECRET_PRIMARY: ${OPPORTUNITY_ADAPTER_SECRET_PRIMARY:?Adapter secret is required}
    healthcheck:
      test: ["CMD", "/core-api", "--healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "8080:8080"
